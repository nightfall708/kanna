name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Verify release tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "${{ github.event.release.tag_name }}" = "v${PACKAGE_VERSION}"

      - run: bun run build

      - run: bun run prepare:export-viewer-release-assets

      - name: Upload export viewer release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/export-viewer-release-assets/* --clobber

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm publish --provenance --access public
